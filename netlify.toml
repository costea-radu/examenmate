[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Stripe webhook trebuie să primească body-ul RAW (nesemnat) pentru verificarea semnăturii
[functions."stripe-webhook"]
  included_files = []

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
